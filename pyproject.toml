[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[project]
name = "game-insights-api"
version = "1.0.0"
readme = "README.md"
description = "Simple side project to store video game data and expose it through a custom API"
dependencies = [
"psycopg2-binary==2.9.11",
"SQLAlchemy==2.0.49",
"typing_extensions==4.15.0",
"pydantic==2.13.3",
"pydantic_core==2.46.3",
"python-dotenv==1.2.2",
"typing-inspection==0.4.2",
]

[project.urls]
Repository = "https://github.com/justinZ45/game-insights-api"

[project.scripts]
gia = "src.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["src*", "db*"]